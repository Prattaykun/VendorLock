name: salesman
description: VendorLock Salesman App — Beat plans, check-ins, order capture for field salesmen
publish_to: "none"
version: 1.0.0+1

environment:
  sdk: ">=3.4.0 <4.0.0"
  flutter: ">=3.22.0"

dependencies:
  flutter:
    sdk: flutter

  # HTTP
  dio: ^5.7.0
  http: ^1.2.2

  # State Management
  flutter_riverpod: ^2.5.1
  riverpod_annotation: ^2.3.5

  # Navigation
  go_router: ^14.2.7

  # Auth / Storage
  flutter_secure_storage: ^9.2.2
  shared_preferences: ^2.3.2

  # Location / GPS
  geolocator: ^12.0.0
  google_maps_flutter: ^2.9.0

  # Telegram Bot (web view integration)
  webview_flutter: ^4.10.0

  # Image
  image_picker: ^1.1.2
  cached_network_image: ^3.4.1

  # Push notifications
  firebase_core: ^3.5.0
  firebase_messaging: ^15.1.3
  flutter_local_notifications: ^17.2.2

  # UI
  fl_chart: ^0.69.0
  shimmer: ^3.0.0
  cupertino_icons: ^1.0.8
  google_fonts: ^6.2.1
  flutter_svg: ^2.0.10+1

  # Utilities
  intl: ^0.19.0
  uuid: ^4.5.1
  logger: ^2.4.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^4.0.0
  build_runner: ^2.4.12
  riverpod_generator: ^2.4.3
  json_serializable: ^6.8.0
  freezed: ^2.5.7
  freezed_annotation: ^2.4.4

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/icons/
    - assets/fonts/

  fonts:
    - family: Outfit
      fonts:
        - asset: assets/fonts/Outfit-Regular.ttf
        - asset: assets/fonts/Outfit-Medium.ttf
          weight: 500
        - asset: assets/fonts/Outfit-Bold.ttf
          weight: 700
